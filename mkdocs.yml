      link: /feed/articles/rss.xml
      name: RSS Feed
    - icon: fontawesome/solid/video
      link: https://cal.com/syenasweta
      name: Schedule a call
    - icon: fontawesome/brands/github
      link: https://github.com/syenasweta
      name: GitHub
    - icon: fontawesome/brands/gitlab
      link: https://gitlab.com/syenasweta
      name: GitLab
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/syenasweta
      name: LinkedIn
    - icon: fontawesome/brands/connectdevelop
      link: https://www.malt.fr/profile/syenasweta
      name: Malt
    - icon: fontawesome/solid/rocket
      link: https://app.comet.co/freelancer/profile/syenasweta
      name: Comet
    - icon: fontawesome/brands/keybase
      link: https://keybase.io/syenasweta
      name: Keybase
    - icon: fontawesome/solid/key
      link: /.well-known/openpgpkey/hu/syenasweta
      name: PGP

theme:
  name: material
  custom_dir: overrides
  static_templates:
    - feed/articles/atom.xml
    - feed/articles/rss.xml
    - feed/articles/feed.json
    - robots.txt
  language: en
  font: false
  features:
    - content.code.copy
    # - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - search.highlight
  logo: static/icon.png
  favicon: static/icon.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to Dark Mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: amber
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to Light Mode

# hooks:
#  - utils/hooks.py

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.caret
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
  - pymdownx.highlight
  - pymdownx.mark
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - toc:
      permalink: "#"

extra_css:
  - assets/stylesheets/extra.css
  - assets/stylesheets/forms.css

extra_javascript:
  # https://squidfunk.github.io/mkdocs-material/reference/mathjax/#configuration
  - assets/javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js